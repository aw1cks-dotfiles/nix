name: CI
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: host-check (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: samueldr/lix-gha-installer-action@v2026-02-22
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          # auto-optimise-store uses /nix/store/.links, which is known to
          # conflict with cache-nix-action restore.
          # Lix enables it by default. Let's explicitly opt out.
          extra_nix_config: |
            auto-optimise-store = false
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          gc-max-store-size-macos: 2G
      - name: Run flake checks (${{ matrix.system }})
        run: |
          nix flake check \
            --accept-flake-config \
            --keep-going \
            --system ${{ matrix.system }}
